services:
  - type: web
    name: smart-data-cleaner
    runtime: python
    pythonVersion: "3.11.6"
    buildCommand: pip install -r SmartCleaner/requirements.txt
    startCommand: gunicorn --chdir SmartCleaner/web -w 4 -b 0.0.0.0:$PORT server:app
    envVars:
      - key: PORT
        value: 5000
