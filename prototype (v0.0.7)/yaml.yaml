# COVID-19 Data Cleaning Configuration
# For dataset with columns: Country, Total Cases, Total Deaths, New Deaths, Total Recovered, etc.

operations:
  # Data Type Conversions
  smart_type_conversion:
    description: "Convert numeric columns from strings to numbers"
    enabled: true
    methods: ["auto", "conservative", "aggressive"]
    default_method: "aggressive"

  handle_missing:
    description: "Handle missing values in COVID-19 data"
    enabled: true
    methods: ["fill_zero", "fill_median", "remove", "forward_fill"]
    default_method: "fill_zero"

  remove_duplicates:
    description: "Remove duplicate country entries"
    enabled: true

  # COVID-19 Specific Operations
  calculate_metrics:
    description: "Calculate COVID-19 specific metrics"
    enabled: true

  validate_ranges:
    description: "Validate COVID-19 data ranges"
    enabled: true

  clean_country_names:
    description: "Standardize country names"
    enabled: true

  handle_outliers:
    description: "Handle outliers in case/death counts"
    enabled: true
    methods: ["cap", "remove", "ignore"]
    default_method: "cap"

  # Feature Engineering
  feature_engineering:
    description: "Create derived COVID-19 metrics"
    enabled: true

strategies:
  data_type_handling: "covid_specific"
  missing_value_strategy: "fill_zero_covid"
  outlier_handling: "conservative"
  validation_level: "strict"

covid_specific:
  # Expected column mappings
  column_mappings:
    country: "Country, Other"
    total_cases: "Total Cases"
    total_deaths: "Total Deaths" 
    new_deaths: "New Deaths"
    total_recovered: "Total Recovered"
    active_cases: "Active Cases"
    serious_critical: "Serious, Critical"
    cases_per_million: "Tot Cases/1M pop"
    deaths_per_million: "Deaths/1M pop"
    total_tests: "Total Tests"
    tests_per_million: "Tests/1M pop"
    population: "Population"

  # Data validation rules
  validation_rules:
    total_cases:
      min: 0
      max: 1000000000
    total_deaths:
      min: 0
      max: 10000000
    new_deaths:
      min: 0
      max: 10000
    active_cases:
      min: 0
    cases_per_million:
      min: 0
      max: 1000000
    deaths_per_million:
      min: 0
      max: 10000

  # Country name standardization
  country_standardization:
    usa: ["United States", "USA", "US", "U.S.A", "United States of America"]
    india: ["India", "IND"]
    france: ["France", "FR", "French Republic"]
    brazil: ["Brazil", "BR", "Brasil"]
    germany: ["Germany", "DE", "Federal Republic of Germany"]
    uk: ["United Kingdom", "UK", "U.K.", "Great Britain", "Britain"]
    italy: ["Italy", "IT", "Italian Republic"]
    spain: ["Spain", "ES", "Kingdom of Spain"]
    russia: ["Russia", "RU", "Russian Federation"]
    china: ["China", "CN", "People's Republic of China"]

  # Derived metrics to calculate
  derived_metrics:
    - name: "case_fatality_rate"
      formula: "total_deaths / total_cases * 100"
      description: "Case Fatality Rate (%)"
    
    - name: "recovery_rate" 
      formula: "total_recovered / total_cases * 100"
      description: "Recovery Rate (%)"
    
    - name: "active_case_rate"
      formula: "active_cases / total_cases * 100"
      description: "Active Case Rate (%)"
    
    - name: "test_positivity_rate"
      formula: "total_cases / total_tests * 100"
      description: "Test Positivity Rate (%)"
    
    - name: "death_to_population_ratio"
      formula: "total_deaths / population * 1000000"
      description: "Death to Population Ratio (per million)"
    
    - name: "cases_to_tests_ratio"
      formula: "total_cases / total_tests"
      description: "Cases to Tests Ratio"

  # Data quality thresholds
  quality_thresholds:
    min_population: 1000
    max_case_fatality_rate: 50  # Maximum realistic CFR %
    min_test_coverage: 100     # Tests per million population
    max_active_cases_ratio: 100 # Active cases shouldn't exceed total cases

  # Outlier detection parameters
  outlier_params:
    iqr_multiplier: 3.0
    z_score_threshold: 4.0
    method: "iqr"

  # Cleaning preferences
  preferences:
    fill_missing_deaths_with_zero: true
    remove_negative_values: true
    standardize_country_names: true
    calculate_all_metrics: true
    validate_cross_metrics: true

# Execution order
execution_order:
  - clean_country_names
  - smart_type_conversion
  - handle_missing
  - remove_duplicates
  - validate_ranges
  - handle_outliers
  - calculate_metrics
  - feature_engineering

# Export settings
export:
  include_original_data: false
  include_cleaning_log: true
  format: "csv"
  encoding: "utf-8"
  include_derived_metrics: true

# Logging preferences
logging:
  level: "detailed"
  save_cleaning_report: true
  include_data_profile: true